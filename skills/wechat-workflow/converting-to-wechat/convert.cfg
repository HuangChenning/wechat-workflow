# ──────────────────────────────────────────────────────────────────────────────
# markdown-to-wechat 默认转换配置
# ──────────────────────────────────────────────────────────────────────────────
# 此文件定义 convert.py 的默认参数值。
# CLI 参数会覆盖此文件中的设置（CLI 优先级最高）。
#
# 路径说明：
#   - 相对路径是相对于运行命令的工作目录（通常是项目根目录）
#   - 也可以使用绝对路径
#
# 修改后直接生效，无需重启，下次运行 convert.py 即自动读取。
# ──────────────────────────────────────────────────────────────────────────────

[defaults]

# 默认视觉样式预设文件（--style 参数的默认值）
# 可选值（styles/ 目录下的文件）：
#   mdnice-test.yaml          暖橙色，mdnice 风格
#   wechat-professional-blue.yaml  专业蓝，适合干货技术文章
#   wechat-classic.yaml       经典深蓝灰
#   wechat-ios-blue.yaml      iOS 蓝风格
#   wechat-minimal-dark.yaml  极简深色
style = skills/wechat-workflow/converting-to-wechat/styles/mdnice-test.yaml

# 默认本地覆盖配置文件（--config 参数的默认值）
# 通常用于存放 OSS 凭据等敏感信息（已加入 .gitignore）
config = skills/wechat-workflow/converting-to-wechat/config.yaml

# 是否默认开启图片上传到 OSS（--upload-images 参数的默认值）
# true = 默认上传；false = 默认不上传（可通过 --upload-images 临时覆盖）
upload_images = true
