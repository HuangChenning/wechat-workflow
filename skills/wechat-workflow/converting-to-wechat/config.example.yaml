# ──────────────────────────────────────────────────────────────────────────────
# markdown-to-wechat 默认配置（示例文件）
# ──────────────────────────────────────────────────────────────────────────────
# 使用说明：
# 1. 复制此文件为 config.yaml
# 2. 填入您的阿里云 OSS 凭据
# 3. config.yaml 已加入 .gitignore，不会被提交到 Git
# ──────────────────────────────────────────────────────────────────────────────

theme: default

# ── 整体容器 ─────────────────────────────────────────────────────────────────
container:
  max_width: "677px"
  font_size: "15px"
  line_height: "1.8"
  color: "#2c3e50"
  font_family: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
  padding: "0 20px"
  margin: "20px auto"

# ── 标题 ──────────────────────────────────────────────────────────────────────
headings:
  h1:
    font_size: "24px"
    color: "#16a085"
    margin: "35px 0 18px"
    font_weight: "bold"
    border_bottom: "2px solid #16a085"
    padding_bottom: "8px"
  h2:
    font_size: "20px"
    color: "#16a085"
    margin: "35px 0 15px"
    font_weight: "bold"
  h3:
    font_size: "17px"
    color: "#2c3e50"
    margin: "28px 0 12px"
    font_weight: "bold"

# ── 正文段落 ──────────────────────────────────────────────────────────────────
paragraph:
  margin: "14px 0"
  color: "#2c3e50"

# ── 粗体（**text**）───────────────────────────────────────────────────────────
strong:
  color: "#e67e22"
  font_weight: "600"

# ── 斜体（*text*）─────────────────────────────────────────────────────────────
em:
  color: "#16a085"
  font_style: "italic"

# ── 行内代码（`code`）─────────────────────────────────────────────────────────
code_inline:
  padding: "2px 5px"
  background: "#f8f9fa"
  border_radius: "3px"
  font_size: "13px"
  color: "#c7254e"
  border: "1px solid #f0f0f0"
  font_family: "'SF Mono', Monaco, Consolas, monospace"

# ── 代码块（```lang ... ```）──────────────────────────────────────────────────
code_block:
  margin: "14px 0"
  padding: "14px"
  background: "#f8f9fa"
  border_radius: "4px"
  border: "1px solid #e9ecef"
  font_size: "13px"
  line_height: "1.6"
  font_family: "'SF Mono', Monaco, Consolas, monospace"
  white_space: "pre-wrap"
  word_wrap: "break-word"
  color: "#2c3e50"

# ── 引用块（> text）───────────────────────────────────────────────────────────
blockquote:
  margin: "18px 0"
  padding: "14px 18px"
  background: "#ecf8f3"
  border_left: "4px solid #16a085"
  color: "#2c3e50"
  border_radius: "0 4px 4px 0"

# ── 列表（- / 1.）────────────────────────────────────────────────────────────
list:
  margin: "14px 0"
  padding_left: "20px"
  color: "#2c3e50"
  item_margin: "8px 0"

# ── 表格 ──────────────────────────────────────────────────────────────────────
table:
  margin: "18px 0"
  width: "100%"
  border_collapse: "collapse"
  border: "1px solid #d5d8dc"
  font_size: "14px"
  header_bg: "#16a085"
  header_color: "#fff"
  header_padding: "10px"
  cell_padding: "10px"
  cell_border: "1px solid #d5d8dc"
  alternate_row_bg: "#f8f9fa"

# ── 分割线（---）──────────────────────────────────────────────────────────────
hr:
  border: "none"
  border_top: "1px solid #bdc3c7"
  margin: "24px 0"

# ── 超链接 ────────────────────────────────────────────────────────────────────
link:
  color: "#16a085"
  text_decoration: "none"

# ── 图片 & OSS 图床配置 ────────────────────────────────────────────────────────
image:
  max_width: "100%"
  height: "auto"
  border: "1px solid #d5d8dc"
  border_radius: "4px"
  box_shadow: "0 2px 8px rgba(0,0,0,0.1)"
  display: "block"
  margin: "18px auto"

  # 是否开启 OSS 上传（使用 --upload-images 参数时自动启用）
  upload_to_oss: true

  # 上传到 OSS 中的目录名（Bucket 内的文件夹前缀）
  oss_dir: "wechat-articles"

  # ── 阿里云 OSS 凭据配置（请填入您的真实凭据）────────────────────────────
  # 获取方式：https://ram.console.aliyun.com/manage/ak
  oss_access_key_id: "YOUR_ACCESS_KEY_ID"
  oss_access_key_secret: "YOUR_ACCESS_KEY_SECRET"
  oss_bucket: "YOUR_BUCKET_NAME"
  oss_region: "oss-cn-shanghai"
  oss_endpoint: "oss-cn-shanghai.aliyuncs.com"
