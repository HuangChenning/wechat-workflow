# Config Example for markdown-to-wechat
# ─────────────────────────────────────────────────────────────────────
# USAGE:
#   1. Copy this file to your series folder as "config.yaml"
#   2. Fill in your actual OSS credentials
#   3. Add "config.yaml" to .gitignore to avoid committing secrets
#
# Example:
#   cp skills/markdown-to-wechat/config-example.yaml "Oracle view/config.yaml"
# ─────────────────────────────────────────────────────────────────────

theme: default

# ── Container ─────────────────────────────────────────────────────────
container:
  max_width: "677px"
  font_size: "15px"
  line_height: "1.8"
  color: "#2c3e50"
  font_family: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
  padding: "0 20px"
  margin: "20px auto"

# ── Headings ──────────────────────────────────────────────────────────
headings:
  h1:
    font_size: "24px"
    color: "#16a085"
    margin: "35px 0 18px"
    font_weight: "bold"
    border_bottom: "2px solid #16a085"
    padding_bottom: "8px"
  h2:
    font_size: "20px"
    color: "#16a085"
    margin: "35px 0 15px"
    font_weight: "bold"
  h3:
    font_size: "17px"
    color: "#2c3e50"
    margin: "28px 0 12px"
    font_weight: "bold"

# ── Body Text ─────────────────────────────────────────────────────────
paragraph:
  margin: "14px 0"
  color: "#2c3e50"

strong:
  color: "#e67e22"
  font_weight: "600"

em:
  color: "#16a085"
  font_style: "italic"

# ── Code ──────────────────────────────────────────────────────────────
code_inline:
  padding: "2px 5px"
  background: "#f8f9fa"
  border_radius: "3px"
  font_size: "13px"
  color: "#c7254e"
  border: "1px solid #f0f0f0"
  font_family: "'SF Mono', Monaco, Consolas, monospace"

code_block:
  margin: "14px 0"
  padding: "14px"
  background: "#f8f9fa"
  border_radius: "4px"
  border: "1px solid #e9ecef"
  font_size: "13px"
  line_height: "1.6"
  font_family: "'SF Mono', Monaco, Consolas, monospace"
  white_space: "pre-wrap"
  word_wrap: "break-word"
  color: "#2c3e50"

# ── Blockquote ────────────────────────────────────────────────────────
blockquote:
  margin: "18px 0"
  padding: "14px 18px"
  background: "#ecf8f3"
  border_left: "4px solid #16a085"
  color: "#2c3e50"
  border_radius: "0 4px 4px 0"

# ── Lists ─────────────────────────────────────────────────────────────
list:
  margin: "14px 0"
  padding_left: "20px"
  color: "#2c3e50"
  item_margin: "8px 0"

# ── Table ─────────────────────────────────────────────────────────────
table:
  margin: "18px 0"
  width: "100%"
  border_collapse: "collapse"
  border: "1px solid #d5d8dc"
  font_size: "14px"
  header_bg: "#16a085"
  header_color: "#fff"
  header_padding: "10px"
  cell_padding: "10px"
  cell_border: "1px solid #d5d8dc"
  alternate_row_bg: "#f8f9fa"

# ── Divider ───────────────────────────────────────────────────────────
hr:
  border: "none"
  border_top: "1px solid #bdc3c7"
  margin: "24px 0"

# ── Link ──────────────────────────────────────────────────────────────
link:
  color: "#16a085"
  text_decoration: "none"

# ── Image & OSS ───────────────────────────────────────────────────────
# To enable OSS upload: set upload_to_oss to true and fill in credentials.
# Then add this file (config.yaml) to .gitignore before committing.
image:
  max_width: "100%"
  height: "auto"
  border: "1px solid #d5d8dc"
  border_radius: "4px"
  box_shadow: "0 2px 8px rgba(0,0,0,0.1)"
  display: "block"
  margin: "18px auto"

  # Set to true to upload local images to Aliyun OSS
  upload_to_oss: false

  # OSS sub-directory for uploaded images
  oss_dir: "wechat-articles"

  # ── Fill in your credentials below (DO NOT commit this file after editing) ──
  oss_access_key_id: "YOUR_ACCESS_KEY_ID"
  oss_access_key_secret: "YOUR_ACCESS_KEY_SECRET"
  oss_bucket: "YOUR_BUCKET_NAME"
  oss_region: "oss-cn-shanghai"
  oss_endpoint: "oss-cn-shanghai.aliyuncs.com"
