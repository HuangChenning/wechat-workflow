# ──────────────────────────────────────────────────────────────────────────────
# 样式名称：wechat-ios-blue
# 风格说明：iOS 蓝色主题，以苹果系统蓝（#007aff）为主色调。
#           干净现代，适合科技、产品类文章，有明显的 Apple 设计感。
# 主色调：#007aff（iOS 蓝）、#e67e22（橙色强调）
# ──────────────────────────────────────────────────────────────────────────────

theme: wechat-ios-blue

# ── 整体容器 ──────────────────────────────────────────────────────────────────
container:
  max_width: 677px        # 微信公众号正文区域推荐宽度
  font_size: 15px
  line_height: '1.8'
  color: '#333333'
  font_family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue',
    Arial, sans-serif     # 优先使用 iOS/macOS 系统字体
  padding: 0 20px
  margin: 20px auto

# ── 标题样式 ──────────────────────────────────────────────────────────────────
headings:
  h1:
    font_size: 24px
    color: '#0061cc'              # 深蓝
    margin: 35px 0 18px
    font_weight: bold
    border_bottom: '2px solid #007aff'  # iOS 蓝分割线
    padding_bottom: 8px
  h2:
    font_size: 20px
    color: '#0061cc'
    margin: 35px 0 15px
    font_weight: bold
  h3:
    font_size: 17px
    color: '#333333'
    margin: 28px 0 12px
    font_weight: bold

# ── 正文段落 ──────────────────────────────────────────────────────────────────
paragraph:
  margin: 14px 0
  color: '#333333'
  text_align: justify

# ── 粗体（**text**）───────────────────────────────────────────────────────────
strong:
  color: '#e67e22'        # 橙色形成跳跃感
  font_weight: '700'

# ── 斜体（*text*）─────────────────────────────────────────────────────────────
em:
  color: '#007aff'        # iOS 蓝斜体
  font_style: italic

# ── 行内代码（`code`）─────────────────────────────────────────────────────────
code_inline:
  padding: 2px 5px
  background: '#f8f9fa'
  border_radius: 3px
  font_size: 13px
  color: '#1462b7'        # 蓝色行内代码
  border: '1px solid #f0f0f0'
  font_family: '''SF Mono'', Monaco, Consolas, monospace'

# ── 代码块（```lang ... ```）──────────────────────────────────────────────────
# convert.py 会自动添加 macOS 风格装饰栏（红黄绿圆点 + 语言标签）
code_block:
  margin: 14px 0
  padding: 14px
  background: '#282c34'   # One Dark 深色背景
  border_radius: 4px
  border: '1px solid #e9ecef'
  font_size: 13px
  line_height: '1.6'
  font_family: Operator Mono, Consolas, Monaco, Menlo, monospace
  white_space: pre-wrap
  word_wrap: break-word
  color: '#abb2bf'

# ── 引用块（> text）───────────────────────────────────────────────────────────
blockquote:
  margin: 18px 0
  padding: 14px 18px
  background: '#f5f7f8'
  border_left: '4px solid #007aff'  # iOS 蓝左边框
  color: '#666666'
  border_radius: 0 4px 4px 0
  text_align: justify

# ── 列表 ──────────────────────────────────────────────────────────────────────
list:
  margin: 14px 0
  padding_left: 20px
  color: '#333333'
  item_margin: 8px 0
  text_align: justify
  section:
    margin: 0
    padding: 0

# ── 表格 ──────────────────────────────────────────────────────────────────────
table:
  margin: 18px 0
  width: 100%
  border_collapse: collapse
  border: '1px solid #cdd8e4'
  font_size: 14px
  header_bg: '#ffffff'
  header_color: '#007aff' # 表头 iOS 蓝文字
  header_padding: 10px
  cell_padding: 10px
  cell_border: '1px solid #cdd8e4'
  cell_color: '#333333'
  alternate_row_bg: '#f9f9fa'
  text_align: justify

# ── 分割线 ────────────────────────────────────────────────────────────────────
hr:
  border: none
  border_top: '1px solid #e0e0e0'
  margin: 24px 0

# ── 超链接 ────────────────────────────────────────────────────────────────────
link:
  color: '#007aff'        # iOS 蓝链接
  text_decoration: none

# ── 图片 ──────────────────────────────────────────────────────────────────────
# OSS 凭据请在根目录 style.yaml 中统一配置，不要写在此预设文件中
image:
  max_width: 100%
  height: auto
  border: '1px solid #cdd8e4'
  border_radius: 4px
  box_shadow: 0 2px 8px rgba(0,0,0,0.05)
  display: block
  margin: 18px auto
  upload_to_oss: false
  oss_dir: wechat-articles
