# ──────────────────────────────────────────────────────────────────────────────
# 样式名称：mdnice-test
# 风格说明：暖橙色主题，带有 mdnice 风格的排版。适合技术型公众号文章。
# 主色调：#ff5f05（橙红）、#168cce（蓝色强调）、#282c34（代码块深色背景）
# ──────────────────────────────────────────────────────────────────────────────

theme: mdnice-test

# ── 整体容器 ──────────────────────────────────────────────────────────────────
# 微信公众号正文区域宽度约 677px，建议保持此值
container:
  max_width: 677px        # 最大宽度，超出会被裁切
  font_size: 14px         # 正文基础字号
  line_height: '1.8'      # 行高，1.6~2.0 适合阅读
  color: '#333333'        # 默认文字颜色
  font_family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue',
    Arial, sans-serif     # 系统默认字体栈，优先使用 iOS/macOS 系统字体
  padding: 0 20px         # 左右内边距
  margin: 20px auto       # 上下外边距，水平居中

# ── 标题样式 ──────────────────────────────────────────────────────────────────
headings:
  h1:
    font_size: 24px
    color: '#d14b00'              # 深橙色
    margin: 35px 0 18px
    font_weight: bold
    border_bottom: '2px solid #ff5f05'  # 标题下方橙色分割线
    padding_bottom: 8px
  h2:
    font_size: 20px
    color: '#d14b00'
    margin: 35px 0 15px
    font_weight: bold
  h3:
    font_size: 17px
    color: '#333333'
    margin: 28px 0 12px
    font_weight: bold

# ── 正文段落 ──────────────────────────────────────────────────────────────────
paragraph:
  margin: 14px 0
  color: '#333333'
  text_align: justify      # 两端对齐

# ── 粗体文字（**text**）────────────────────────────────────────────────────────
strong:
  color: '#168cce'        # 蓝色强调，用于突出关键词
  font_weight: '700'

# ── 斜体文字（*text*）─────────────────────────────────────────────────────────
em:
  color: '#ff5f05'        # 橙色斜体，用于次要强调
  font_style: italic

# ── 行内代码（`code`）─────────────────────────────────────────────────────────
code_inline:
  padding: 2px 5px
  background: '#f8f9fa'
  border_radius: 3px
  font_size: 13px
  color: '#b74f14'        # 橙褐色，与主题保持一致
  border: '1px solid #f0f0f0'
  font_family: '''SF Mono'', Monaco, Consolas, monospace'

# ── 代码块（```lang ... ```）──────────────────────────────────────────────────
# 注意：convert.py 会在代码块顶部自动添加 macOS 风格装饰栏（红黄绿圆点）
# background 和 color 会被同步应用到装饰栏背景和语言标签颜色
code_block:
  margin: 14px 0
  padding: 14px
  background: '#282c34'   # One Dark 风格深色背景
  border_radius: 4px
  border: '1px solid #e9ecef'
  font_size: 13px
  line_height: '1.6'
  font_family: Operator Mono, Consolas, Monaco, Menlo, monospace
  white_space: pre-wrap   # 自动换行，防止代码在微信端超出宽度
  word_wrap: break-word
  color: '#abb2bf'        # One Dark 浅灰色代码文字

# ── 引用块（> text）───────────────────────────────────────────────────────────
blockquote:
  margin: 18px 0
  padding: 14px 18px
  background: '#f8f6f5'   # 米白色背景
  border_left: '4px solid #ff5f05'  # 左侧橙色竖线
  color: '#666666'
  border_radius: 0 4px 4px 0
  text_align: justify

# ── 列表（- item / 1. item）──────────────────────────────────────────────────
list:
  margin: 14px 0
  padding_left: 20px
  color: '#333333'
  item_margin: 8px 0      # 列表项之间的间距
  text_align: justify
  section:                # 针对列表内嵌套的块级内容（如分段）
    margin: 0
    padding: 0

# ── 表格 ──────────────────────────────────────────────────────────────────────
table:
  margin: 18px 0
  width: 100%
  border_collapse: collapse
  border: '1px solid #e4d5cd'
  font_size: 12px         # 表格字号，可适当调小以容纳更多内容
  header_bg: '#ffffff'    # 表头背景色（白色，搭配 header_color 做区分）
  header_color: '#ff5f05' # 表头文字颜色（橙色）
  header_padding: 10px
  cell_padding: 10px      # 单元格内边距
  cell_border: '1px solid #e4d5cd'
  cell_color: '#333333'   # 普通单元格文字颜色
  text_align: justify
  alternate_row_bg: '#faf9f9'  # 奇偶行交替背景（斑马纹），空字符串可关闭

# ── 分割线（---）──────────────────────────────────────────────────────────────
hr:
  border: none
  border_top: '1px solid #e0e0e0'
  margin: 24px 0

# ── 超链接（[text](url)）──────────────────────────────────────────────────────
link:
  color: '#ff5f05'        # 橙色链接
  text_decoration: none   # 不显示下划线（微信内链接无实际效果，建议 none）

# ── 图片（![alt](url)）────────────────────────────────────────────────────────
# 图片会居中显示，OSS 凭据请在根目录 style.yaml 中统一配置，不要写在此文件
image:
  max_width: 100%
  height: auto
  border: '1px solid #e4d5cd'
  border_radius: 4px
  box_shadow: 0 2px 8px rgba(0,0,0,0.05)
  display: block
  margin: 18px auto
  upload_to_oss: false    # OSS 上传开关（凭据请在 style.yaml 中配置）
  oss_dir: wechat-articles  # OSS 中的目录名
